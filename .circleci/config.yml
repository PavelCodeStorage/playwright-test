version: 2.1

jobs:
  build:
    docker:
    - image: pdovwork/seavus_code_talks:latest
    working_directory: ~/repo

    steps:
    
      - checkout
      - restore_cache:
          name: Restore Npm Package Cache
          key: npm-dependencies-{{ checksum "package-lock.json" }}

      - run: npm install -g node-gyp
      - run: npm install

      - save_cache:
          name: Save Npm Package Cache
          key: npm-dependencies-{{ checksum "package-lock.json" }}
          paths:
             - node_modules

      - run:
          name: Run unit test
          command: npm run test

      - deploy:
          name: conditionally run a deploy job
          command: |
            curl --user eca45d80a6665fed9063043cc9979e6b8a3382e9 \
              --data build_parameters[CIRCLE_JOB]=build \
             --data revision=87462209ec78af7b02f776efbcfca4cba0265678 \
              https://circleci.com/api/v1.1/project/github/PavelCodeStorage/seavus_aqa_code_talks/tree/main  
      