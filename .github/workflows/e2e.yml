name: Mocha Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - name: Get ignored tag and run tests
        run: |
          TAG=$(curl -s -X POST http://localhost:3000/resolve \
            -H "Content-Type: application/json" \
            -d '{}' | jq -r '.excludeTags[0] // empty')

          echo "Ignored tag: $TAG"

          if [ -z "$TAG" ]; then
            npm run e2e:test
          else
            npm run e2e:test -- --grep "$TAG" --invert
          fi